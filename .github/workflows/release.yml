name: Publish Release Builds
on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: SDK version
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: |
              target/x86_64-unknown-linux-gnu/release/libbasedauth.a
              include/basedauth.h
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: target/x86_64-pc-windows-msvc/release/basedauth.lib
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  create_release:
    runs-on: ubuntu-22.04
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: |
            basedauth.lib
            target/x86_64-unknown-linux-gnu/release/libbasedauth.a
            include/basedauth.h
